<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-orientations" content="portrait">
    
    <link class="apple-touch-icon" rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/510/ffffff/journal.png">
    
    <title>Agenda iPhone Portrait</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .font-manuscrit { font-family: "Chalkboard SE", "Comic Sans MS", sans-serif; }
        .font-classique { font-family: "Times New Roman", Georgia, serif; }
        .font-moderne { font-family: system-ui, sans-serif; }
        .papier-ligne { background-image: linear-gradient(#c6c6c8 1px, transparent 1px); background-size: 100% 32px; line-height: 32px; }
        .papier-quadrille { background-image: linear-gradient(rgba(198,198,200,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(198,198,200,0.3) 1px, transparent 1px); background-size: 24px 24px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media screen and (orientation: landscape) {
            #bloqueur-orientation { display: flex !important; }
        }

        #volet-notes { transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="bg-[#242426] text-black antialiased flex flex-col h-full overflow-hidden pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]">

    <div id="bloqueur-orientation" class="fixed inset-0 bg-[#242426] text-white z-50 hidden flex-col items-center justify-center p-6 text-center">
        <span class="text-4xl mb-4">📱</span>
        <p class="font-serif text-lg">Merci de remettre votre iPhone en mode Portrait.</p>
    </div>

    <div id="vue-couverture" class="fixed inset-0 flex items-center justify-center p-6 z-50 bg-[#242426]">
        <div onclick="ouvrirCarnet()" ontouchstart="ouvrirCarnet()" class="w-full max-w-xs aspect-[3/4] rounded-2xl relative shadow-2xl flex flex-col items-center justify-between p-8 text-center bg-[#141416] text-[#ccaa66] cursor-pointer select-none" id="cuir-couverture">
            <div class="absolute left-0 top-0 bottom-0 w-4 bg-black/30 rounded-l-2xl border-r border-black/10"></div>
            <div class="mt-12 flex flex-col items-center gap-4">
                <span class="text-4xl">📔</span>
                <h1 class="text-3xl font-serif tracking-[0.3em] font-bold">AGENDA</h1>
            </div>
            <div class="bg-white/5 text-white/60 text-xs font-semibold tracking-wider uppercase px-6 py-3 rounded-xl border border-white/10 mb-4 pointer-events-none">
                Ouvrir le carnet
            </div>
        </div>
    </div>

    <div id="vue-interieur" class="hidden flex-1 flex flex-col overflow-hidden relative">
        
        <header class="h-12 shrink-0 flex justify-between items-center px-4 text-white z-20 relative">
            <button onclick="fermerCarnet()" ontouchstart="fermerCarnet()" class="text-sm bg-white/10 px-3 py-1.5 rounded-lg active:scale-95 transition-transform">📁 Fermer</button>
            <div class="flex gap-4">
                <button onclick="setStylo('encre')" ontouchstart="setStylo('encre')" class="w-6 h-6 rounded-full bg-[#1c1c1e] border-2 border-white shadow" id="btn-stylo-encre"></button>
                <button onclick="setStylo('bleu')" ontouchstart="setStylo('bleu')" class="w-6 h-6 rounded-full bg-[#1d4ed8]" id="btn-stylo-bleu"></button>
                <button onclick="setStylo('rouge')" ontouchstart="setStylo('rouge')" class="w-6 h-6 rounded-full bg-[#b91c1c]" id="btn-stylo-rouge"></button>
            </div>
            <button onclick="ouvrirReglages()" ontouchstart="ouvrirReglages(event)" class="text-2xl p-2 active:scale-95 transition-transform" style="position: relative; z-index: 30;">⚙️</button>
        </header>

        <main class="flex-1 flex flex-col m-2 rounded-xl shadow-xl overflow-hidden relative z-10" id="page-gauche" style="background-color: #faf9f5;">
            <div class="p-4 shrink-0 border-b border-black/5">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-2">
                        <h2 class="text-base font-bold font-serif uppercase tracking-wider" id="label-date-ancre">Jeudi 25 Juin 2026</h2>
                        <button onclick="allerAujourdhui()" ontouchstart="allerAujourdhui()" id="btn-today" class="hidden text-[10px] bg-red-600 text-white font-bold px-2 py-0.5 rounded-full">AUJ</button>
                    </div>
                    <div class="flex gap-5 text-base font-bold">
                        <button onclick="naviguerDate(-1)" ontouchstart="naviguerDate(-1)" class="px-2 py-1">◀</button>
                        <button onclick="naviguerDate(1)" ontouchstart="naviguerDate(1)" class="px-2 py-1">▶</button>
                    </div>
                </div>

                <div class="grid grid-cols-4 gap-1 p-1 bg-black/5 rounded-lg text-center text-xs font-bold">
                    <button onclick="setMode(0)" ontouchstart="setMode(0)" id="btn-mode-0" class="py-2 rounded-md text-gray-500">Jour</button>
                    <button onclick="setMode(1)" ontouchstart="setMode(1)" id="btn-mode-1" class="py-2 rounded-md text-gray-500">Sem.</button>
                    <button onclick="setMode(2)" ontouchstart="setMode(2)" id="btn-mode-2" class="py-2 rounded-md text-gray-500">Mois</button>
                    <button onclick="setMode(3)" ontouchstart="setMode(3)" id="btn-mode-3" class="py-2 rounded-md text-gray-500">Année</button>
                </div>
            </div>

            <div id="moteur-agenda" class="flex-1 overflow-y-auto p-4 no-scrollbar"></div>
            
            <div onclick="ouvrirNotes()" ontouchstart="ouvrirNotes()" class="absolute right-0 top-1/2 -translate-y-1/2 w-4 h-24 bg-amber-600/30 rounded-l-md cursor-pointer flex items-center justify-center text-[10px] text-amber-900 font-bold">◀</div>
        </main>

        <div id="volet-notes" class="absolute top-12 bottom-2 right-0 w-[92%] z-40 translate-x-full flex shadow-2xl">
            <div class="flex-1 rounded-l-xl p-4 flex flex-col border-l border-black/10" id="page-droite" style="background-color: #faf9f5;">
                <div class="flex justify-between items-center mb-3 border-b border-black/5 pb-1">
                    <h3 class="text-sm italic font-serif opacity-50">Notes Volantes</h3>
                    <button onclick="fermerNotes()" ontouchstart="fermerNotes()" class="text-xs font-bold text-amber-800 bg-amber-100 px-3 py-1 rounded-lg">Glisser ➔</button>
                </div>
                <div class="flex-1 relative rounded-lg overflow-hidden p-1" id="box-fond-papier">
                    <textarea id="zone-notes" oninput="sauverNotes()" class="w-full h-full bg-transparent resize-none border-none outline-none focus:ring-0 p-1 text-base" placeholder="Écrivez vos notes ici..."></textarea>
                </div>
            </div>
        </div>

    </div>

    <div id="modale-editeur" class="fixed inset-0 bg-black/60 z-50 hidden flex items-end justify-center p-4 backdrop-blur-xs">
        <div class="bg-[#1c1c1e] text-white w-full rounded-2xl p-5 space-y-4 shadow-2xl border border-white/10">
            <div class="flex justify-between items-center border-b border-white/10 pb-2">
                <h4 id="editeur-titre-mode" class="font-bold text-base">Événement</h4>
                <button onclick="fermerEditeur()" ontouchstart="fermerEditeur()" class="text-blue-400 text-sm font-medium">Annuler</button>
            </div>
            <div class="space-y-3">
                <input type="text" id="form-titre" placeholder="Titre" class="w-full bg-[#2c2c2e] px-3 py-2.5 rounded-lg text-sm outline-none">
                <input type="text" id="form-lieu" placeholder="Lieu (Optionnel)" class="w-full bg-[#2c2c2e] px-3 py-2.5 rounded-lg text-sm outline-none">
                
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="text-xs text-gray-400 block mb-1">Heure Début</label>
                        <input type="time" id="form-debut" class="bg-[#2c2c2e] px-3 py-2 rounded-lg text-sm w-full outline-none">
                    </div>
                    <div class="w-1/2">
                        <label class="text-xs text-gray-400 block mb-1">Heure Fin</label>
                        <input type="time" id="form-fin" class="bg-[#2c2c2e] px-3 py-2 rounded-lg text-sm w-full outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-xs text-gray-400 block mb-1">Catégorie</label>
                    <div class="flex flex-wrap gap-1.5" id="form-cats">
                        <button onclick="setFormCat('Pro')" class="px-3 py-1.5 rounded-full text-xs font-bold border" id="cat-Pro">Pro</button>
                        <button onclick="setFormCat('Perso')" class="px-3 py-1.5 rounded-full text-xs font-bold border" id="cat-Perso">Perso</button>
                        <button onclick="setFormCat('Loisir')" class="px-3 py-1.5 rounded-full text-xs font-bold border" id="cat-Loisir">Loisir</button>
                        <button onclick="setFormCat('Médical')" class="px-3 py-1.5 rounded-full text-xs font-bold border" id="cat-Médical">Médical</button>
                        <button onclick="setFormCat('Important')" class="px-3 py-1.5 rounded-full text-xs font-bold border" id="cat-Important">Important</button>
                    </div>
                </div>
            </div>
            <div class="pt-2 flex gap-2">
                <button onclick="supprimerRDV()" ontouchstart="supprimerRDV()" id="btn-supprimer-rdv" class="hidden bg-red-600 hover:bg-red-700 py-2.5 px-4 rounded-xl font-medium text-sm">🗑️</button>
                <button onclick="validerRDV()" ontouchstart="validerRDV()" class="flex-1 bg-blue-600 hover:bg-blue-700 py-2.5 rounded-xl font-bold text-sm text-center">Enregistrer</button>
            </div>
        </div>
    </div>

    <div id="modale-reglages" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-[#1c1c1e] text-white w-full max-w-xs rounded-2xl p-4 space-y-4 text-sm border border-white/10">
            <div class="flex justify-between items-center border-b border-white/10 pb-2">
                <h3 class="font-bold text-base">Réglages</h3>
                <button onclick="fermerReglages()" ontouchstart="fermerReglages()" class="text-blue-400 font-bold">OK</button>
            </div>
            <div class="space-y-2">
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-400 font-semibold uppercase">Le Papier</label>
                    <select id="reg-papier" onchange="changeRegrage('stylePapier', this.value)" class="w-full bg-[#2c2c2e] p-2 rounded-lg text-xs outline-none text-white">
                        <option value="ligné">📝 Ligné</option>
                        <option value="quadrillé">🔲 Carré</option>
                        <option value="blanc">📄 Blanc</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-400 font-semibold uppercase">Écriture</label>
                    <select id="reg-police" onchange="changeRegrage('stylePoliceNotes', this.value)" class="w-full bg-[#2c2c2e] p-2 rounded-lg text-xs outline-none text-white">
                        <option value="manuscrit">✍️ Main</option>
                        <option value="classique">📜 Classique</option>
                        <option value="moderne">📱 Digitale</option>
                    </select>
                </div>
            </div>
            
            <div class="pt-3 border-t border-white/10 space-y-2">
                <label class="text-[10px] text-gray-400 font-semibold uppercase block">Sauvegarde</label>
                <button onclick="exporterJSON()" ontouchstart="exporterJSON()" class="w-full bg-indigo-600/30 text-indigo-400 border border-indigo-500/30 py-2 rounded-lg text-xs font-medium">Exporter vers Fichiers (JSON)</button>
                <label class="w-full bg-emerald-600/30 text-emerald-400 border border-emerald-500/30 py-2 rounded-lg text-xs font-medium block text-center cursor-pointer">
                    Importer depuis Fichiers (JSON)
                    <input type="file" accept=".json" class="hidden" onchange="importerJSON(this)">
                </label>
            </div>
        </div>
    </div>

    <script>
        let settings = { stylePapier: 'ligné', stylePoliceNotes: 'manuscrit', couleurStylos: 'encre' };
        try {
            settings.stylePapier = localStorage.getItem('iphone_stylePapier') || 'ligné';
            settings.stylePoliceNotes = localStorage.getItem('iphone_stylePoliceNotes') || 'manuscrit';
            settings.couleurStylos = localStorage.getItem('iphone_couleurStylos') || 'encre';
        } catch(e) {}

        let evenements = [];
        try {
            evenements = JSON.parse(localStorage.getItem('events_iphone')) || [];
        } catch(e) {}

        let modeAffichage = 2; 
        let dateAncre = new Date();
        let selectedFormCat = "Pro";
        let targetRdvId = null;
        let notesOuvertes = false;

        const couleursCats = { "Pro": "#3b82f6", "Perso": "#22c55e", "Loisir": "#f97316", "Médical": "#a855f7", "Important": "#ef4444" };

        window.onload = function() {
            setMode(2); 
            syncUI();
        };

        function ouvrirCarnet() {
            document.getElementById('vue-couverture').style.display = 'none';
            document.getElementById('vue-interieur').classList.remove('hidden');
            syncUI();
        }
        function fermerCarnet() {
            document.getElementById('vue-interieur').classList.add('hidden');
            document.getElementById('vue-couverture').style.display = 'flex';
        }
        function ouvrirNotes() {
            notesOuvertes = true;
            document.getElementById('volet-notes').style.transform = 'translateX(0)';
        }
        function fermerNotes() {
            notesOuvertes = false;
            document.getElementById('volet-notes').style.transform = 'translateX(100%)';
        }
        function sauverNotes() {
            localStorage.setItem('notes_iphone', document.getElementById('zone-notes').value);
        }
        
        // Modification : ajout du stopPropagation pour éviter les interférences tactiles sur iOS
        function ouvrirReglages(e) { 
            if(e) { e.stopPropagation(); e.preventDefault(); }
            document.getElementById('modale-reglages').style.display = "flex"; 
        }
        function fermerReglages() { document.getElementById('modale-reglages').style.display = "none"; }
        
        function changeRegrage(cle, valeur) {
            settings[cle] = valeur;
            localStorage.setItem('iphone_' + cle, valeur);
            syncUI();
        }
        function setStylo(c) {
            settings.couleurStylos = c;
            localStorage.setItem('iphone_couleurStylos', c);
            syncUI();
        }
        function setMode(m) {
            modeAffichage = m;
            for(let i=0; i<4; i++) {
                let btn = document.getElementById(`btn-mode-${i}`);
                if (btn) {
                    btn.className = i === m ? "py-2 rounded-md bg-white shadow-sm font-bold text-black" : "py-2 rounded-md text-gray-500";
                }
            }
            renderAgenda();
        }
        function naviguerDate(delta) {
            if (modeAffichage === 0) dateAncre.setDate(dateAncre.getDate() + delta);
            else if (modeAffichage === 1) dateAncre.setDate(dateAncre.getDate() + (delta * 7));
            else if (modeAffichage === 2) dateAncre.setMonth(dateAncre.getMonth() + delta);
            else if (modeAffichage === 3) dateAncre.setFullYear(dateAncre.getFullYear() + delta);
            syncUI();
        }
        function allerAujourdhui() { dateAncre = new Date(); syncUI(); }

        function syncUI() {
            if(document.getElementById('zone-notes')) {
                document.getElementById('zone-notes').value = localStorage.getItem('notes_iphone') || '';
            }
            const encres = { "encre": "#1c1c1e", "bleu": "#1d4ed8", "rouge": "#b91c1c" };
            const couleurEncre = encres[settings.couleurStylos] || "#1c1c1e";
            
            if(document.getElementById('zone-notes')) {
                document.getElementById('zone-notes').style.color = couleurEncre;
            }
            if(document.getElementById('box-fond-papier')) {
                document.getElementById('box-fond-papier').className = "w-full flex-1 relative rounded-lg " + (settings.stylePapier === 'ligné' ? 'papier-ligne' : (settings.stylePapier === 'quadrillé' ? 'papier-quadrille' : ''));
            }
            
            let fontClass = "font-manuscrit";
            if(settings.stylePoliceNotes === 'classique') fontClass = "font-classique";
            else if(settings.stylePoliceNotes === 'moderne') fontClass = "font-moderne";
            
            if(document.getElementById('zone-notes')) {
                document.getElementById('zone-notes').className = `w-full h-full bg-transparent resize-none border-none outline-none focus:ring-0 p-2 ${fontClass} text-base`;
            }

            if(document.getElementById('reg-papier')) document.getElementById('reg-papier').value = settings.stylePapier;
            if(document.getElementById('reg-police')) document.getElementById('reg-police').value = settings.stylePoliceNotes;

            const auj = new Date();
            const estAuj = dateAncre.getDate() === auj.getDate() && dateAncre.getMonth() === auj.getMonth() && dateAncre.getFullYear() === auj.getFullYear();
            if(document.getElementById('btn-today')) {
                document.getElementById('btn-today').style.display = estAuj ? 'none' : 'inline-block';
            }
            if(document.getElementById('label-date-ancre')) {
                document.getElementById('label-date-ancre').innerText = dateAncre.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' });
            }
            
            renderAgenda();
        }

        function renderAgenda() {
            const container = document.getElementById('moteur-agenda');
            if(!container) return;
            container.innerHTML = "";

            if (modeAffichage === 0) {
                let html = "<div class='space-y-1.5'>";
                for(let h=7; h<=21; h++) {
                    const rdv = evenements.filter(r => {
                        let d = new Date(r.date);
                        return d.getDate() === dateAncre.getDate() && d.getMonth() === dateAncre.getMonth() && d.getFullYear() === dateAncre.getFullYear() && r.heureDebut === h;
                    });
                    html += `<div class="flex items-center gap-3 h-14 border-b border-black/5">
                        <span class="text-sm font-bold opacity-40 w-10">${String(h).padStart(2, '0')}h</span>
                        <div class="flex-1 h-full flex items-center">`;
                    if(rdv.length === 0) {
                        html += `<button onclick="ouvrirEditeur(${h})" ontouchstart="ouvrirEditeur(${h})" class="w-full h-full text-left text-black/5 text-base flex items-center">➕</button>`;
                    } else {
                        rdv.forEach(r => {
                            html += `<div onclick="ouvrirModif('${r.id}')" ontouchstart="ouvrirModif('${r.id}')" class="w-full text-sm font-bold p-2 rounded" style="background: ${couleursCats[r.categorie]}15; color: #1c1c1e; border-left: 4px solid ${couleursCats[r.categorie]}">${r.titre}</div>`;
                        });
                    }
                    html += `</div></div>`;
                }
                container.innerHTML = html + "</div>";
            } 
            else if (modeAffichage === 1) {
                let html = "<div class='space-y-2'>";
                let cal = new Date(dateAncre);
                cal.setDate(cal.getDate() - (cal.getDay() === 0 ? 6 : cal.getDay() - 1));
                for(let i=0; i<7; i++) {
                    const rdv = evenements.filter(r => {
                        let d = new Date(r.date);
                        return d.getDate() === cal.getDate() && d.getMonth() === cal.getMonth() && d.getFullYear() === cal.getFullYear();
                    });
                    html += `<div onclick="redirigerJour('${cal.toISOString()}')" ontouchstart="redirigerJour('${cal.toISOString()}')" class="p-4 rounded-xl bg-black/5 flex justify-between items-center active:bg-black/10">
                        <span class="text-sm font-bold capitalize">${cal.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric' })}</span>
                        ${rdv.length > 0 ? `<span class="text-xs font-bold bg-black/10 px-2.5 py-1 rounded-md">${rdv.length} rdv</span>` : ''}
                    </div>`;
                    cal.setDate(cal.getDate() + 1);
                }
                container.innerHTML = html + "</div>";
            }
            else if (modeAffichage === 2) {
                let html = `<div class="grid grid-cols-7 gap-1.5 text-center">`;
                ["L","M","M","J","V","S","D"].forEach(l => html += `<div class="text-xs font-bold opacity-40 py-1">${l}</div>`);
                
                let premier = new Date(dateAncre.getFullYear(), dateAncre.getMonth(), 1);
                let espaces = premier.getDay() === 0 ? 6 : premier.getDay() - 1;
                for(let e=0; e<espaces; e++) html += `<div></div>`;
                
                let jours = new Date(dateAncre.getFullYear(), dateAncre.getMonth() + 1, 0).getDate();
                let auj = new Date();
                for(let j=1; j<=jours; j++) {
                    let estAuj = auj.getDate() === j && auj.getMonth() === dateAncre.getMonth() && auj.getFullYear() === dateAncre.getFullYear();
                    let rdv = evenements.some(r => {
                        let d = new Date(r.date);
                        return d.getDate() === j && d.getMonth() === dateAncre.getMonth() && d.getFullYear() === dateAncre.getFullYear();
                    });
                    html += `<button onclick="redirigerJour('${new Date(dateAncre.getFullYear(), dateAncre.getMonth(), j).toISOString()}')" ontouchstart="redirigerJour('${new Date(dateAncre.getFullYear(), dateAncre.getMonth(), j).toISOString()}')" class="aspect-square rounded-xl flex flex-col items-center justify-center p-1 border border-black/5 ${estAuj ? 'text-white font-bold' : 'bg-black/[0.02]'}" style="${estAuj ? 'background-color: #b91c1c;' : ''}">
                        <span class="text-sm">${j}</span>
                        <div class="w-1.5 h-1.5 rounded-full mt-0.5 ${rdv ? (estAuj ? 'bg-white' : 'bg-amber-600') : 'bg-transparent'}"></div>
                    </button>`;
                }
                container.innerHTML = html + "</div>";
            }
            else if (modeAffichage === 3) {
                let html = `<div class="grid grid-cols-2 gap-2">`;
                for(let m=0; m<12; m++) {
                    let dMois = new Date(dateAncre.getFullYear(), m, 1);
                    html += `<div onclick="redirigerMois(${m})" ontouchstart="redirigerMois(${m})" class="bg-black/5 p-2 rounded-xl flex flex-col">
                        <h4 class="text-xs font-bold text-red-700 font-serif mb-1 capitalize text-center border-b border-black/5 pb-0.5">${dMois.toLocaleDateString('fr-FR', {month: 'long'})}</h4>
                        <div class="grid grid-cols-7 gap-0.5 text-[8px] text-center text-black/30">`;
                    
                    let decal = (dMois.getDay() + 6) % 7;
                    for(let e=0; e<decal; e++) { html += `<div></div>`; }
                    let jInMois = new Date(dateAncre.getFullYear(), m + 1, 0).getDate();
                    for(let j=1; j<=jInMois; j++) {
                        html += `<div>${j}</div>`;
                    }
                    html += `</div></div>`;
                }
                container.innerHTML = html + "</div>";
            }
        }

        function redirigerJour(iso) { dateAncre = new Date(iso); setMode(0); syncUI(); }
        function redirigerMois(m) { dateAncre.setMonth(m); setMode(2); syncUI(); }

        function ouvrirEditeur(heure) {
            targetRdvId = null;
            document.getElementById('editeur-titre-mode').innerText = "Nouvel Événement";
            document.getElementById('form-titre').value = "";
            document.getElementById('form-lieu').value = "";
            document.getElementById('form-debut').value = `${String(heure).padStart(2,'0')}:00`;
            document.getElementById('form-fin').value = `${String(heure+1).padStart(2,'0')}:00`;
            document.getElementById('btn-supprimer-rdv').classList.add('hidden');
            setFormCat('Pro');
            document.getElementById('modale-editeur').style.display = "flex";
        }
        function abrirModif(id) {
            targetRdvId = id;
            let r = evenements.find(x => x.id === id);
            document.getElementById('editeur-titre-mode').innerText = "Modifier l'Événement";
            document.getElementById('form-titre').value = r.titre;
            document.getElementById('form-lieu').value = r.lieu || "";
            document.getElementById('form-debut').value = `${String(r.heureDebut).padStart(2,'0')}:${String(r.minuteDebut).padStart(2,'0')}`;
            document.getElementById('form-fin').value = `${String(r.heureFin).padStart(2,'0')}:${String(r.minuteFin).padStart(2,'0')}`;
            document.getElementById('btn-supprimer-rdv').classList.remove('hidden');
            setFormCat(r.categorie || 'Pro');
            document.getElementById('modale-editeur').style.display = "flex";
        }
        function fermerEditeur() { document.getElementById('modale-editeur').style.display = "none"; }

        function setFormCat(cat) {
            selectedFormCat = cat;
            ["Pro", "Perso", "Loisir", "Médical", "Important"].forEach(c => {
                const btn = document.getElementById(`cat-${c}`);
                if(btn) {
                    if(c === cat) {
                        btn.className = `px-3 py-1.5 rounded-full text-xs font-bold border text-white`;
                        btn.style.backgroundColor = couleursCats[c];
                        btn.style.borderColor = couleursCats[c];
                    } else {
                        btn.className = `px-3 py-1.5 rounded-full text-xs font-bold border`;
                        btn.style.backgroundColor = "transparent";
                        btn.style.borderColor = couleursCats[c];
                        btn.style.color = couleursCats[c];
                    }
                }
            });
        }

        function validerRDV() {
            const titre = document.getElementById('form-titre').value.trim() || "Sans Titre";
            const lieu = document.getElementById('form-lieu').value.trim();
            const tDebut = document.getElementById('form-debut').value.split(':');
            const tFin = document.getElementById('form-fin').value.split(':');
            const hDeb = parseInt(tDebut[0]) || 9, mDeb = parseInt(tDebut[1]) || 0;
            const hFin = parseInt(tFin[0]) || 10, mFin = parseInt(tFin[1]) || 0;

            if(targetRdvId) {
                let match = evenements.find(x => x.id === targetRdvId);
                if(match) {
                    match.titre = titre; match.lieu = lieu; match.categorie = selectedFormCat;
                    match.heureDebut = hDeb; match.minuteDebut = mDeb; match.heureFin = hFin; match.minuteFin = mFin;
                }
            } else {
                evenements.push({
                    id: 'id_' + Date.now(), date: dateAncre.toISOString(),
                    heureDebut: hDeb, minuteDebut: mDeb, heureFin: hFin, minuteFin: mFin,
                    titre, lieu, categorie: selectedFormCat
                });
            }
            localStorage.setItem('events_iphone', JSON.stringify(evenements));
            fermerEditeur(); syncUI();
        }
        function supprimerRDV() {
            evenements = evenements.filter(x => x.id !== targetRdvId);
            localStorage.setItem('events_iphone', JSON.stringify(evenements));
            fermerEditeur(); syncUI();
        }

        function exporterJSON() {
            const packageGlobal = { evenements, notes: localStorage.getItem('notes_iphone') || '' };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(packageGlobal, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "agenda_iphone_backup.json");
            document.body.appendChild(dl); dl.click(); dl.remove();
        }
        function importerJSON(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const backup = JSON.parse(e.target.result);
                    if (backup.evenements) evenements = backup.evenements;
                    if (backup.notes) localStorage.setItem('notes_iphone', backup.notes);
                    localStorage.setItem('events_iphone', JSON.stringify(evenements));
                    syncUI(); alert("Importation réussie ✓"); fermerReglages();
                } catch(err) { alert("Fichier JSON invalide."); }
            };
            reader.readAsText(file);
        }

        let startX = 0; let startY = 0;
        document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, {passive:true});
        document.addEventListener('touchend', e => {
            let diffX = e.changedTouches[0].clientX - startX;
            let diffY = e.changedTouches[0].clientY - startY;
            if(Math.abs(diffX) > 80 && Math.abs(diffY) < 40) {
                if(diffX < 0 && !notesOuvertes) ouvrirNotes();
                if(diffX > 0 && notesOuvertes) fermerNotes();
            }
        }, {passive:true});
    </script>
</body>
</html>
